name: EMA Screener

on:
  workflow_dispatch:
  schedule:
    # Cron is in UTC. This equals IST: 05:30, 09:30, 13:30, 17:30, 21:30, 01:30
    - cron: "0 0,4,8,12,16,20 * * *"

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Debug step: confirms secrets are actually reaching the job (prints True/False only)
      - name: Debug env presence
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python -c "import os; print('token_set=', bool(os.getenv('TELEGRAM_BOT_TOKEN'))); print('chat_set=', bool(os.getenv('TELEGRAM_CHAT_ID')))"

      - name: Run scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MAX_CONCURRENCY: "8"
          PER_SYMBOL_DELAY_SEC: "0.03"
          TG_BETWEEN_MSG_DELAY_SEC: "0.7"
        run: |
          python scanner.py
